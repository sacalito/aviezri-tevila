<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tevila Control</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/flatpickr.min.css') }}">

    <script src="{{ url_for('static', filename='js/alpine3.min.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/flatpickr.js') }}" defer></script>

    <style>
        [x-cloak] { display: none !important; }

        /* Flatpickr theme override */
        .flatpickr-calendar {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            font-family: inherit;
        }
        .flatpickr-months, .flatpickr-month {
            background: #fff;
            border-radius: 1rem 1rem 0 0;
        }
        .flatpickr-months .flatpickr-prev-month:hover,
        .flatpickr-months .flatpickr-next-month:hover {
            color: oklch(var(--p));
            fill: oklch(var(--p));
        }
        .flatpickr-day {
            border-radius: 0.5rem;
        }
        .flatpickr-day:hover {
            background: oklch(var(--p) / 0.1);
            border-color: oklch(var(--p) / 0.1);
        }
        .flatpickr-day.today {
            border-color: oklch(var(--p));
        }
        .flatpickr-day.flatpickr-disabled {
            background: #fee2e2 !important;
            color: #dc2626 !important;
            border-color: #fecaca !important;
            cursor: pointer !important;
            font-weight: 600;
        }
        .flatpickr-day.flatpickr-disabled:hover {
            background: #fecaca !important;
        }
        .dayContainer {
            min-width: 280px;
            max-width: 280px;
        }
        .flatpickr-innerContainer {
            border-bottom: none;
        }

        /* Toast animation */
        .toast-enter { animation: slideIn 0.3s ease-out; }
        .toast-exit { animation: slideOut 0.3s ease-in forwards; }
        @keyframes slideIn { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-0.5rem); } }

        /* Pulse glow for active relay */
        .relay-active-heating { box-shadow: 0 0 24px rgba(234, 88, 12, 0.15); }
        .relay-active-filtering { box-shadow: 0 0 24px rgba(6, 182, 212, 0.15); }
    </style>
</head>
<body x-data="tevilaApp()" class="bg-white min-h-screen">

    <!-- Toast Notifications -->
    <div class="fixed top-4 right-4 z-[100] flex flex-col gap-2" x-cloak>
        <template x-for="(toast, i) in toasts" :key="toast.id">
            <div class="alert shadow-lg max-w-sm" :class="{
                'alert-success': toast.type === 'success',
                'alert-error': toast.type === 'error',
                'alert-info': toast.type === 'info',
                'toast-enter': !toast.exiting,
                'toast-exit': toast.exiting
            }">
                <span class="text-sm" x-text="toast.message"></span>
            </div>
        </template>
    </div>

    <!-- Login Screen -->
    <template x-if="!authenticated">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="card bg-white shadow-lg w-full max-w-sm border border-gray-100 rounded-2xl">
                <div class="card-body items-center text-center gap-6">
                    <div>
                        <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mx-auto mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                        </div>
                        <h2 class="text-2xl font-bold">Tevila Control</h2>
                        <p class="text-sm opacity-50 mt-1">Enter password to continue</p>
                    </div>
                    <div class="w-full space-y-3">
                        <input type="password" x-model="passwordInput" @keyup.enter="login()" placeholder="Password" class="input input-bordered w-full focus:input-primary" />
                        <button @click="login()" class="btn btn-primary w-full">Login</button>
                    </div>
                    <p x-show="loginError" class="text-error text-sm" x-cloak>Incorrect password</p>
                </div>
            </div>
        </div>
    </template>

    <!-- Main App -->
    <template x-if="authenticated">
        <div class="max-w-6xl mx-auto p-4 md:p-6">

            <!-- Header -->
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-bold">Tevila Control</h1>
                    <p class="text-sm opacity-40 mt-0.5" x-text="currentTime"></p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-success animate-pulse"></div>
                    <span class="text-sm opacity-60">Online</span>
                </div>
            </div>

            <!-- Active Bypasses -->
            <div class="flex flex-wrap gap-3 mb-3" x-show="activeBypasses.length > 0">
                <template x-for="(bp, i) in activeBypasses" :key="'bp-'+i">
                    <div class="flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-medium border" :class="bp.relay === 'heating' ? 'bg-orange-50 text-orange-800 border-orange-200' : 'bg-cyan-50 text-cyan-800 border-cyan-200'">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z" /></svg>
                        <span>
                            BYPASS <span class="uppercase" x-text="bp.state"></span>
                            <span class="capitalize" x-text="bp.relay"></span>
                            <span class="opacity-60">until</span>
                            <span x-text="bp.display"></span>
                        </span>
                        <button @click="clearBypass(bp.relay)" class="btn btn-ghost btn-xs ml-1 opacity-50 hover:opacity-100">&times;</button>
                    </div>
                </template>
            </div>

            <!-- Next Actions -->
            <div class="flex flex-wrap gap-3 mb-8" x-show="nextActions.length > 0 || activeBypasses.length > 0">
                <template x-for="(action, i) in nextActions" :key="i">
                    <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm" :class="action.relay === 'heating' ? 'bg-orange-50 text-orange-700' : 'bg-cyan-50 text-cyan-700'">
                        <svg x-show="action.relay === 'heating'" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z" /></svg>
                        <svg x-show="action.relay === 'filtering'" xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0L12 2.69z" /></svg>
                        <span>
                            <span class="font-semibold capitalize" x-text="action.relay"></span>
                            <span x-text="action.state"></span>
                            <span class="opacity-60">at</span>
                            <span class="font-medium" x-text="action.time"></span>
                        </span>
                    </div>
                </template>
            </div>

            <!-- Relay Dashboard -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <!-- Heating Card -->
                <div class="card border rounded-2xl transition-all duration-300" :class="heatingState === 'on' ? 'bg-gradient-to-br from-orange-50 to-red-50 border-orange-200 relay-active-heating' : 'bg-white border-gray-100'">
                    <div class="card-body gap-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl flex items-center justify-center" :class="heatingState === 'on' ? 'bg-orange-100' : 'bg-base-200'">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" :class="heatingState === 'on' ? 'text-orange-500' : 'opacity-30'" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z" /></svg>
                                </div>
                                <div>
                                    <h3 class="font-bold text-lg">Heating</h3>
                                    <p class="text-xs opacity-50">GPIO 24</p>
                                </div>
                            </div>
                            <div class="badge badge-lg font-bold" :class="heatingState === 'on' ? 'badge-warning' : 'badge-neutral'">
                                <span class="uppercase" x-text="heatingState"></span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button @click="openBypassModal('heating', 'on')" class="btn btn-sm flex-1" :class="heatingState === 'on' ? 'btn-warning btn-outline' : 'btn-warning'">ON</button>
                            <button @click="openBypassModal('heating', 'off')" class="btn btn-sm flex-1" :class="heatingState === 'off' ? 'btn-neutral btn-outline' : 'btn-neutral'">OFF</button>
                        </div>
                    </div>
                </div>

                <!-- Filtering Card -->
                <div class="card border rounded-2xl transition-all duration-300" :class="filteringState === 'on' ? 'bg-gradient-to-br from-cyan-50 to-blue-50 border-cyan-200 relay-active-filtering' : 'bg-white border-gray-100'">
                    <div class="card-body gap-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl flex items-center justify-center" :class="filteringState === 'on' ? 'bg-cyan-100' : 'bg-base-200'">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" :class="filteringState === 'on' ? 'text-cyan-500' : 'opacity-30'" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0L12 2.69z" /></svg>
                                </div>
                                <div>
                                    <h3 class="font-bold text-lg">Filtering</h3>
                                    <p class="text-xs opacity-50">GPIO 23</p>
                                </div>
                            </div>
                            <div class="badge badge-lg font-bold" :class="filteringState === 'on' ? 'badge-info' : 'badge-neutral'">
                                <span class="uppercase" x-text="filteringState"></span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button @click="openBypassModal('filtering', 'on')" class="btn btn-sm flex-1" :class="filteringState === 'on' ? 'btn-info btn-outline' : 'btn-info'">ON</button>
                            <button @click="openBypassModal('filtering', 'off')" class="btn btn-sm flex-1" :class="filteringState === 'off' ? 'btn-neutral btn-outline' : 'btn-neutral'">OFF</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Schedules - Two Column -->
            <h2 class="text-xl font-bold mb-4">Schedules</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">

                <!-- Heating Schedule Column -->
                <div>
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-2 h-5 rounded-full bg-orange-400"></div>
                        <h3 class="font-bold text-lg">Heating</h3>
                    </div>

                    <!-- Add form -->
                    <div class="flex flex-wrap gap-2 items-center bg-gray-50 rounded-xl p-3 mb-3">
                        <select x-ref="heatingDaySelect" class="select select-bordered select-sm flex-1 min-w-[100px]">
                            <template x-for="d in allDays" :key="'hs-'+d">
                                <option :value="d" x-text="d"></option>
                            </template>
                        </select>
                        <input type="time" x-ref="heatingStartTime" class="input input-bordered input-sm w-28" />
                        <input type="time" x-ref="heatingEndTime" class="input input-bordered input-sm w-28" />
                        <button @click="addHours('heating')" class="btn btn-warning btn-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        </button>
                    </div>

                    <!-- Day groups -->
                    <div class="space-y-2.5">
                        <template x-for="day in allDays" :key="'heating-' + day">
                            <div x-show="heatingHoursByDay(day).length > 0" class="border border-gray-100 rounded-xl overflow-hidden">
                                <div class="flex items-center justify-between px-4 py-2.5 bg-gray-50/80">
                                    <div class="flex items-center gap-2">
                                        <span class="font-semibold text-sm" x-text="day"></span>
                                        <span class="text-xs text-gray-400" x-text="heatingHoursByDay(day).length + ' entries'"></span>
                                    </div>
                                    <button @click="openCopyDay('heating', day)" class="btn btn-ghost btn-xs gap-1 text-gray-400 hover:text-gray-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                        Copy
                                    </button>
                                </div>
                                <ul>
                                    <template x-for="hour in heatingHoursByDay(day)" :key="hour.id">
                                        <li class="border-t border-gray-50">
                                            <div x-show="editingId !== hour.id" class="flex items-center justify-between px-4 py-2.5 hover:bg-gray-50/50 transition-colors">
                                                <div class="flex items-center gap-2.5">
                                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                    <span class="font-mono text-sm" x-text="`${hour.start_time} - ${hour.end_time}`"></span>
                                                </div>
                                                <div class="flex gap-1">
                                                    <button @click="startEdit(hour)" class="btn btn-ghost btn-xs text-gray-400 hover:text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg></button>
                                                    <button @click="openDuplicate(hour)" class="btn btn-ghost btn-xs text-gray-400 hover:text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg></button>
                                                    <button @click="deleteHour(hour.id)" class="btn btn-ghost btn-xs text-gray-300 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                                                </div>
                                            </div>
                                            <div x-show="editingId === hour.id" class="flex flex-wrap items-center gap-2 px-4 py-2.5 bg-amber-50/50" x-cloak>
                                                <input type="time" class="input input-bordered input-sm w-28" x-model="editStart" />
                                                <span class="text-gray-300">to</span>
                                                <input type="time" class="input input-bordered input-sm w-28" x-model="editEnd" />
                                                <div class="flex gap-1 ml-auto">
                                                    <button @click="saveEdit(hour.id)" class="btn btn-success btn-sm btn-outline">Save</button>
                                                    <button @click="cancelEdit()" class="btn btn-ghost btn-sm">Cancel</button>
                                                </div>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                        <p x-show="heatingHours.length === 0" class="text-sm text-gray-300 text-center py-8">No heating schedule</p>
                    </div>
                </div>

                <!-- Filtering Schedule Column -->
                <div>
                    <div class="flex items-center gap-2 mb-3">
                        <div class="w-2 h-5 rounded-full bg-cyan-400"></div>
                        <h3 class="font-bold text-lg">Filtering</h3>
                    </div>

                    <!-- Add form -->
                    <div class="flex flex-wrap gap-2 items-center bg-gray-50 rounded-xl p-3 mb-3">
                        <select x-ref="filteringDaySelect" class="select select-bordered select-sm flex-1 min-w-[100px]">
                            <template x-for="d in allDays" :key="'fs-'+d">
                                <option :value="d" x-text="d"></option>
                            </template>
                        </select>
                        <input type="time" x-ref="filteringStartTime" class="input input-bordered input-sm w-28" />
                        <input type="time" x-ref="filteringEndTime" class="input input-bordered input-sm w-28" />
                        <button @click="addHours('filtering')" class="btn btn-info btn-sm">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        </button>
                    </div>

                    <!-- Day groups -->
                    <div class="space-y-2.5">
                        <template x-for="day in allDays" :key="'filtering-' + day">
                            <div x-show="filteringHoursByDay(day).length > 0" class="border border-gray-100 rounded-xl overflow-hidden">
                                <div class="flex items-center justify-between px-4 py-2.5 bg-gray-50/80">
                                    <div class="flex items-center gap-2">
                                        <span class="font-semibold text-sm" x-text="day"></span>
                                        <span class="text-xs text-gray-400" x-text="filteringHoursByDay(day).length + ' entries'"></span>
                                    </div>
                                    <button @click="openCopyDay('filtering', day)" class="btn btn-ghost btn-xs gap-1 text-gray-400 hover:text-gray-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                        Copy
                                    </button>
                                </div>
                                <ul>
                                    <template x-for="hour in filteringHoursByDay(day)" :key="hour.id">
                                        <li class="border-t border-gray-50">
                                            <div x-show="editingId !== hour.id" class="flex items-center justify-between px-4 py-2.5 hover:bg-gray-50/50 transition-colors">
                                                <div class="flex items-center gap-2.5">
                                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                    <span class="font-mono text-sm" x-text="`${hour.start_time} - ${hour.end_time}`"></span>
                                                </div>
                                                <div class="flex gap-1">
                                                    <button @click="startEdit(hour)" class="btn btn-ghost btn-xs text-gray-400 hover:text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg></button>
                                                    <button @click="openDuplicate(hour)" class="btn btn-ghost btn-xs text-gray-400 hover:text-gray-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg></button>
                                                    <button @click="deleteHour(hour.id)" class="btn btn-ghost btn-xs text-gray-300 hover:text-red-500"><svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
                                                </div>
                                            </div>
                                            <div x-show="editingId === hour.id" class="flex flex-wrap items-center gap-2 px-4 py-2.5 bg-cyan-50/50" x-cloak>
                                                <input type="time" class="input input-bordered input-sm w-28" x-model="editStart" />
                                                <span class="text-gray-300">to</span>
                                                <input type="time" class="input input-bordered input-sm w-28" x-model="editEnd" />
                                                <div class="flex gap-1 ml-auto">
                                                    <button @click="saveEdit(hour.id)" class="btn btn-success btn-sm btn-outline">Save</button>
                                                    <button @click="cancelEdit()" class="btn btn-ghost btn-sm">Cancel</button>
                                                </div>
                                            </div>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                        <p x-show="filteringHours.length === 0" class="text-sm text-gray-300 text-center py-8">No filtering schedule</p>
                    </div>
                </div>

            </div>

            <!-- Bypass Modal -->
            <div x-show="showBypassModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm" @click.self="closeBypassModal()" x-cloak x-transition.opacity>
                <div class="card bg-white w-80 shadow-2xl border border-gray-100 rounded-2xl" x-transition>
                    <div class="card-body gap-4">
                        <div>
                            <h3 class="font-bold text-lg">Bypass <span class="capitalize" x-text="bypassRelay"></span></h3>
                            <p class="text-sm opacity-50 mt-0.5">
                                Turn <span class="uppercase font-semibold" x-text="bypassState"></span> until:
                            </p>
                        </div>
                        <!-- Quick options -->
                        <div class="grid grid-cols-2 gap-2">
                            <button @click="setBypassQuick(1)" class="btn btn-sm btn-outline">1 hour</button>
                            <button @click="setBypassQuick(2)" class="btn btn-sm btn-outline">2 hours</button>
                            <button @click="setBypassQuick(4)" class="btn btn-sm btn-outline">4 hours</button>
                            <button @click="setBypassQuick(8)" class="btn btn-sm btn-outline">8 hours</button>
                            <button @click="setBypassQuick(12)" class="btn btn-sm btn-outline">12 hours</button>
                            <button @click="setBypassQuick(24)" class="btn btn-sm btn-outline">24 hours</button>
                        </div>
                        <!-- Custom -->
                        <div class="divider text-xs opacity-40 my-0">or pick a time</div>
                        <div class="flex gap-2">
                            <input type="date" class="input input-bordered input-sm flex-1" x-model="bypassDate" :min="todayDate" />
                            <input type="time" class="input input-bordered input-sm w-28" x-model="bypassTime" />
                        </div>
                        <div class="flex gap-2 justify-end pt-1">
                            <button @click="closeBypassModal()" class="btn btn-ghost btn-sm">Cancel</button>
                            <button @click="confirmBypass()" class="btn btn-primary btn-sm" :disabled="!bypassDate || !bypassTime">Set Bypass</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Duplicate / Copy Day Modal -->
            <div x-show="showDayPicker" class="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm" @click.self="closeDayPicker()" x-cloak x-transition.opacity>
                <div class="card bg-white w-80 shadow-2xl border border-gray-100 rounded-2xl" x-transition>
                    <div class="card-body gap-4">
                        <div>
                            <h3 class="font-bold text-lg" x-text="dayPickerTitle"></h3>
                            <p class="text-sm opacity-50 mt-0.5" x-text="dayPickerSubtitle"></p>
                        </div>
                        <div class="space-y-1">
                            <template x-for="d in availableDaysForPicker" :key="d">
                                <label class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-base-200 cursor-pointer transition-colors">
                                    <input type="checkbox" :value="d" x-model="selectedDays" class="checkbox checkbox-sm checkbox-primary" />
                                    <span class="text-sm font-medium" x-text="d"></span>
                                </label>
                            </template>
                        </div>
                        <div class="flex gap-2 justify-end pt-2">
                            <button @click="closeDayPicker()" class="btn btn-ghost btn-sm">Cancel</button>
                            <button @click="confirmDayPicker()" class="btn btn-primary btn-sm" :disabled="selectedDays.length === 0">
                                Duplicate
                                <span x-show="selectedDays.length > 0" class="badge badge-sm" x-text="selectedDays.length"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Special Dates -->
            <h2 class="text-xl font-bold mb-4">Special Dates</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                <!-- YomTov Calendar -->
                <div class="card bg-white border border-gray-100 rounded-2xl">
                    <div class="card-body">
                        <h3 class="font-bold text-lg">Yom Tov</h3>
                        <p class="text-sm opacity-50 mb-3">Click to add/remove Yom Tov dates.</p>
                        <div x-ref="calendar"></div>
                    </div>
                </div>
                <!-- Erev Jag Calendar -->
                <div class="card bg-white border border-gray-100 rounded-2xl">
                    <div class="card-body">
                        <h3 class="font-bold text-lg">Erev Jag</h3>
                        <p class="text-sm opacity-50 mb-3">Click to add/remove Erev Jag dates.</p>
                        <div x-ref="erevJagCalendar"></div>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="text-center text-xs opacity-30 pb-8">
                Tevila Control System
            </footer>

        </div>
    </template>

    <script>
        function tevilaApp() {
            return {
                authenticated: false,
                passwordInput: '',
                loginError: false,
                currentTime: '',
                heatingState: '...',
                filteringState: '...',
                heatingHours: [],
                filteringHours: [],
                specialDates: [],
                specialDatesWithIds: [],
                erevJagDates: [],
                erevJagDatesWithIds: [],
                erevJagCalendar: null,
                apiToken: 'FeGHtFHiQmukbZXB4ygUZiJPqeiKD6318Q0xZjzbAKT2L1MC72IB8ed2hIZ9J6jX',
                calendar: null,

                allDays: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday', 'YomTov', 'ErevJag'],
                scheduleTab: 'heating',

                editingId: null,
                editStart: '',
                editEnd: '',

                showDayPicker: false,
                dayPickerTitle: '',
                dayPickerSubtitle: '',
                selectedDays: [],
                dayPickerMode: null,
                dayPickerRelay: null,
                dayPickerSourceDay: null,
                dayPickerHour: null,
                availableDaysForPicker: [],

                nextActions: [],
                activeBypasses: [],

                // Bypass modal
                showBypassModal: false,
                bypassRelay: '',
                bypassState: '',
                bypassDate: '',
                bypassTime: '',

                toasts: [],
                toastId: 0,

                // --- Toast ---
                showToast(message, type = 'info') {
                    const id = ++this.toastId;
                    this.toasts.push({ id, message, type, exiting: false });
                    setTimeout(() => {
                        const t = this.toasts.find(t => t.id === id);
                        if (t) t.exiting = true;
                        setTimeout(() => {
                            this.toasts = this.toasts.filter(t => t.id !== id);
                        }, 300);
                    }, 3000);
                },

                // --- Next Actions ---
                computeNextActions() {
                    const now = new Date();
                    const nowMins = now.getHours() * 60 + now.getMinutes();
                    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                    const todayStr = now.toISOString().split('T')[0];
                    const isYomTov = this.specialDates.includes(todayStr);
                    const isErevJag = this.erevJagDates.includes(todayStr);
                    const todayDay = isYomTov ? 'YomTov' : isErevJag ? 'ErevJag' : days[now.getDay()];

                    const allHours = [...this.heatingHours, ...this.filteringHours];
                    const todayEntries = allHours.filter(h => h.day === todayDay);

                    const events = [];
                    for (const entry of todayEntries) {
                        const [sh, sm] = entry.start_time.split(':').map(Number);
                        const [eh, em] = entry.end_time.split(':').map(Number);
                        const startMins = sh * 60 + sm;
                        const endMins = eh * 60 + em;

                        if (startMins > nowMins) {
                            events.push({ relay: entry.relay, state: 'on', mins: startMins, time: entry.start_time.slice(0, 5) });
                        }
                        if (endMins > nowMins) {
                            events.push({ relay: entry.relay, state: 'off', mins: endMins, time: entry.end_time.slice(0, 5) });
                        }
                    }

                    events.sort((a, b) => a.mins - b.mins);

                    // Show 1 next action per relay
                    const result = [];
                    let foundHeating = false, foundFiltering = false;
                    for (const e of events) {
                        if (e.relay === 'heating' && foundHeating) continue;
                        if (e.relay === 'filtering' && foundFiltering) continue;
                        const [h, m] = e.time.split(':').map(Number);
                        const ampm = h >= 12 ? 'PM' : 'AM';
                        const h12 = h % 12 || 12;
                        e.time = m === 0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2, '0')}${ampm}`;
                        result.push(e);
                        if (e.relay === 'heating') foundHeating = true;
                        if (e.relay === 'filtering') foundFiltering = true;
                        if (foundHeating && foundFiltering) break;
                    }
                    this.nextActions = result;
                },

                // --- Bypass ---
                get todayDate() {
                    return new Date().toISOString().split('T')[0];
                },

                openBypassModal(relay, state) {
                    this.bypassRelay = relay;
                    this.bypassState = state;
                    this.bypassDate = this.todayDate;
                    this.bypassTime = '';
                    this.showBypassModal = true;
                },

                closeBypassModal() {
                    this.showBypassModal = false;
                    this.bypassRelay = '';
                    this.bypassState = '';
                    this.bypassDate = '';
                    this.bypassTime = '';
                },

                setBypassQuick(hours) {
                    const until = new Date(Date.now() + hours * 3600000);
                    this.bypassDate = until.toISOString().split('T')[0];
                    const hh = String(until.getHours()).padStart(2, '0');
                    const mm = String(until.getMinutes()).padStart(2, '0');
                    this.bypassTime = `${hh}:${mm}`;
                    this.confirmBypass();
                },

                async confirmBypass() {
                    if (!this.bypassDate || !this.bypassTime) return;
                    const until = `${this.bypassDate} ${this.bypassTime}:00`;
                    try {
                        const response = await fetch('/relay/bypass', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({
                                relay: this.bypassRelay,
                                state: this.bypassState,
                                until: until
                            })
                        });
                        if (!response.ok) throw new Error('Failed');
                        this.showToast(`Bypass ${this.bypassState.toUpperCase()} ${this.bypassRelay} until ${this.bypassTime}`, 'success');
                        this.closeBypassModal();
                        await this.checkStatus();
                        await this.loadBypasses();
                    } catch (error) {
                        this.showToast('Error setting bypass', 'error');
                        console.error('Error:', error);
                    }
                },

                async clearBypass(relay) {
                    try {
                        const response = await fetch('/relay/clear_bypass', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ relay: relay })
                        });
                        if (!response.ok) throw new Error('Failed');
                        this.showToast(`Bypass cleared for ${relay}`, 'info');
                        await this.loadBypasses();
                    } catch (error) {
                        this.showToast('Error clearing bypass', 'error');
                    }
                },

                async loadBypasses() {
                    try {
                        const response = await fetch('/api/bypasses', {
                            method: 'GET',
                            headers: { 'Authorization': 'Bearer ' + this.apiToken }
                        });
                        if (!response.ok) throw new Error('Failed');
                        const data = await response.json();
                        this.activeBypasses = (data.bypasses || []).map(bp => {
                            const d = new Date(bp.until.replace(' ', 'T'));
                            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                            const h = d.getHours();
                            const m = d.getMinutes();
                            const ampm = h >= 12 ? 'PM' : 'AM';
                            const h12 = h % 12 || 12;
                            const timeStr = m === 0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2, '0')}${ampm}`;
                            const today = new Date();
                            const isToday = d.toDateString() === today.toDateString();
                            const display = isToday ? timeStr : `${timeStr} ${days[d.getDay()]}`;
                            return { ...bp, display };
                        });
                    } catch (error) {
                        console.error('Error loading bypasses:', error);
                    }
                },

                // --- Schedule helpers ---
                getHoursByDay(relay, day) {
                    const hours = relay === 'heating' ? this.heatingHours : this.filteringHours;
                    return hours.filter(h => h.day === day);
                },

                getCurrentHours() {
                    return this.scheduleTab === 'heating' ? this.heatingHours : this.filteringHours;
                },

                heatingHoursByDay(day) {
                    return this.heatingHours.filter(h => h.day === day);
                },

                filteringHoursByDay(day) {
                    return this.filteringHours.filter(h => h.day === day);
                },

                // --- Edit ---
                startEdit(hour) {
                    this.editingId = hour.id;
                    this.editStart = hour.start_time;
                    this.editEnd = hour.end_time;
                },

                cancelEdit() {
                    this.editingId = null;
                    this.editStart = '';
                    this.editEnd = '';
                },

                async saveEdit(hourId) {
                    if (!this.editStart || !this.editEnd) return;
                    try {
                        const response = await fetch('/update_hours', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({
                                hour_id: hourId,
                                start_time: this.editStart,
                                end_time: this.editEnd
                            })
                        });
                        if (!response.ok) throw new Error('Failed to update');
                        this.cancelEdit();
                        await this.loadHours();
                        this.showToast('Schedule updated', 'success');
                    } catch (error) {
                        this.showToast('Error updating schedule', 'error');
                        console.error('Error:', error);
                    }
                },

                // --- Duplicate ---
                openDuplicate(hour) {
                    this.dayPickerMode = 'duplicate';
                    this.dayPickerRelay = hour.relay;
                    this.dayPickerHour = hour;
                    this.dayPickerTitle = 'Duplicate Entry';
                    this.dayPickerSubtitle = `${hour.start_time} - ${hour.end_time}`;
                    this.availableDaysForPicker = this.allDays.filter(d => d !== hour.day);
                    this.selectedDays = [];
                    this.showDayPicker = true;
                },

                openCopyDay(relay, day) {
                    this.dayPickerMode = 'copyDay';
                    this.dayPickerRelay = relay;
                    this.dayPickerSourceDay = day;
                    this.dayPickerTitle = `Copy ${day}`;
                    this.dayPickerSubtitle = `Copy all ${relay} entries to:`;
                    this.availableDaysForPicker = this.allDays.filter(d => d !== day);
                    this.selectedDays = [];
                    this.showDayPicker = true;
                },

                closeDayPicker() {
                    this.showDayPicker = false;
                    this.dayPickerMode = null;
                    this.dayPickerRelay = null;
                    this.dayPickerSourceDay = null;
                    this.dayPickerHour = null;
                    this.selectedDays = [];
                },

                async confirmDayPicker() {
                    if (this.selectedDays.length === 0) return;
                    try {
                        let entries = [];
                        if (this.dayPickerMode === 'duplicate') {
                            for (const day of this.selectedDays) {
                                entries.push({
                                    relay: this.dayPickerRelay,
                                    day: day,
                                    start_time: this.dayPickerHour.start_time,
                                    end_time: this.dayPickerHour.end_time
                                });
                            }
                        } else if (this.dayPickerMode === 'copyDay') {
                            const hours = this.dayPickerRelay === 'heating' ? this.heatingHours : this.filteringHours;
                            const sourceEntries = hours.filter(h => h.day === this.dayPickerSourceDay);
                            for (const day of this.selectedDays) {
                                for (const entry of sourceEntries) {
                                    entries.push({
                                        relay: this.dayPickerRelay,
                                        day: day,
                                        start_time: entry.start_time,
                                        end_time: entry.end_time
                                    });
                                }
                            }
                        }

                        for (const entry of entries) {
                            const response = await fetch('/add_hours', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': 'Bearer ' + this.apiToken
                                },
                                body: JSON.stringify(entry)
                            });
                            if (!response.ok) throw new Error('Failed to add');
                        }

                        this.showToast(`Duplicated to ${this.selectedDays.length} days`, 'success');
                        this.closeDayPicker();
                        await this.loadHours();
                    } catch (error) {
                        this.showToast('Error duplicating', 'error');
                        console.error('Error:', error);
                    }
                },

                // --- Auth ---
                async login() {
                    try {
                        const response = await fetch('/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ password: this.passwordInput })
                        });
                        if (response.ok) {
                            this.authenticated = true;
                            this.loginError = false;
                            this.startApp();
                        } else {
                            this.loginError = true;
                        }
                    } catch (error) {
                        this.loginError = true;
                    }
                },

                startApp() {
                    this.startClock();
                    this.checkStatus();
                    this.loadHours();
                    this.loadSpecialDates();
                    this.loadErevJagDates();
                    this.loadBypasses();
                    this.initCalendar();
                    this.initErevJagCalendar();
                    setInterval(() => this.checkStatus(), 30000);
                    setInterval(() => { this.computeNextActions(); this.loadBypasses(); }, 60000);
                },

                async init() {
                    try {
                        const response = await fetch('/check_session');
                        if (response.ok) {
                            this.authenticated = true;
                            this.startApp();
                        }
                    } catch (e) {}
                },

                startClock() {
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                },

                updateTime() {
                    const now = new Date();
                    const opts = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
                    this.currentTime = now.toLocaleDateString('en-US', opts);
                },

                // --- Status ---
                async checkStatus() {
                    try {
                        const response = await fetch('/api/status', {
                            method: 'GET',
                            headers: { 'Authorization': 'Bearer ' + this.apiToken }
                        });
                        if (!response.ok) throw new Error('Network error');
                        const data = await response.json();
                        this.heatingState = data.heating;
                        this.filteringState = data.filtering;
                    } catch (error) {
                        console.error('Error:', error);
                    }
                },

                // --- Relay ---
                async relayOn(relayName) {
                    try {
                        const response = await fetch('/relay/on', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ relay: relayName })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.checkStatus();
                        this.showToast(`${relayName} turned on`, 'success');
                    } catch (error) {
                        this.showToast(`Error turning on ${relayName}`, 'error');
                    }
                },

                async relayOff(relayName) {
                    try {
                        const response = await fetch('/relay/off', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ relay: relayName })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.checkStatus();
                        this.showToast(`${relayName} turned off`, 'info');
                    } catch (error) {
                        this.showToast(`Error turning off ${relayName}`, 'error');
                    }
                },

                // --- Hours ---
                async loadHours() {
                    try {
                        const response = await fetch('/hours', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({})
                        });
                        if (!response.ok) throw new Error('Network error');
                        const data = await response.json();
                        if (data.hours && Array.isArray(data.hours)) {
                            this.heatingHours = data.hours.filter(h => h.relay === 'heating');
                            this.filteringHours = data.hours.filter(h => h.relay === 'filtering');
                            this.computeNextActions();
                        }
                    } catch (error) {
                        console.error('Error loading hours:', error);
                    }
                },

                async addHours(relayName) {
                    try {
                        const dayRef = relayName + 'DaySelect';
                        const startRef = relayName + 'StartTime';
                        const endRef = relayName + 'EndTime';

                        const day = this.$refs[dayRef].value;
                        const startTime = this.$refs[startRef].value;
                        const endTime = this.$refs[endRef].value;

                        if (!day || !startTime || !endTime) {
                            this.showToast('Please fill all fields', 'error');
                            return;
                        }

                        const response = await fetch('/add_hours', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({
                                relay: relayName,
                                day: day,
                                start_time: startTime,
                                end_time: endTime
                            })
                        });
                        if (!response.ok) throw new Error('Failed to add hours');
                        await this.loadHours();
                        this.$refs[startRef].value = '';
                        this.$refs[endRef].value = '';
                        this.showToast(`Added to ${day}`, 'success');
                    } catch (error) {
                        this.showToast('Error adding schedule', 'error');
                    }
                },

                async deleteHour(hourId) {
                    if (!confirm("Delete this schedule entry?")) return;
                    try {
                        const response = await fetch('/delete_hours', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ hour_id: hourId })
                        });
                        if (!response.ok) throw new Error('Failed to delete');
                        await this.loadHours();
                        this.showToast('Entry deleted', 'info');
                    } catch (error) {
                        this.showToast('Error deleting', 'error');
                    }
                },

                // --- Dates ---
                async loadSpecialDates() {
                    try {
                        const response = await fetch('/dates', {
                            method: 'GET',
                            headers: { 'Authorization': 'Bearer ' + this.apiToken }
                        });
                        if (!response.ok) throw new Error('Failed');
                        const data = await response.json();
                        if (data.dates && Array.isArray(data.dates)) {
                            this.specialDatesWithIds = data.dates;
                            this.specialDates = data.dates.map(d => d.date);
                            this.updateCalendar();
                            this.computeNextActions();
                        }
                    } catch (error) {
                        console.error('Error loading special dates:', error);
                    }
                },

                initCalendar() {
                    const self = this;
                    this.$nextTick(() => {
                        this.calendar = flatpickr(this.$refs.calendar, {
                            inline: true,
                            mode: "multiple",
                            dateFormat: "Y-m-d",
                            disable: [],
                            onChange(selectedDates, dateStr, instance) {
                                if (dateStr && !self.specialDates.includes(dateStr)) {
                                    self.addSpecialDateFromCalendar(dateStr);
                                }
                                instance.clear();
                            },
                            onDayCreate(dObj, dStr, fp, dayElem) {
                                const dateString = dayElem.dateObj.toISOString().split('T')[0];
                                if (self.specialDates.includes(dateString)) {
                                    dayElem.addEventListener('click', () => {
                                        self.deleteSpecialDate(dateString);
                                    });
                                }
                            }
                        });
                        this.updateCalendar();
                    });
                },

                async addSpecialDateFromCalendar(dateString) {
                    try {
                        const response = await fetch('/add_date', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ date: dateString })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.loadSpecialDates();
                        this.showToast(`Yom Tov added: ${dateString}`, 'success');
                    } catch (error) {
                        this.showToast('Error adding date', 'error');
                    }
                },

                updateCalendar() {
                    if (this.calendar) {
                        if (this.specialDates.length > 0) {
                            this.calendar.set('disable', this.specialDates.map(date => ({
                                from: date, to: date
                            })));
                        } else {
                            this.calendar.set('disable', []);
                        }
                        this.calendar.redraw();
                    }
                },

                async deleteSpecialDate(dateString) {
                    try {
                        const specialDate = this.specialDatesWithIds.find(d => d.date === dateString);
                        if (!specialDate) return;
                        const response = await fetch('/delete_date', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ date_id: specialDate.id })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.loadSpecialDates();
                        this.showToast(`Yom Tov removed: ${dateString}`, 'info');
                    } catch (error) {
                        this.showToast('Error removing date', 'error');
                    }
                },

                // --- Erev Jag Dates ---
                async loadErevJagDates() {
                    try {
                        const response = await fetch('/erev_jag_dates', {
                            method: 'GET',
                            headers: { 'Authorization': 'Bearer ' + this.apiToken }
                        });
                        if (!response.ok) throw new Error('Failed');
                        const data = await response.json();
                        if (data.dates && Array.isArray(data.dates)) {
                            this.erevJagDatesWithIds = data.dates;
                            this.erevJagDates = data.dates.map(d => d.date);
                            this.updateErevJagCalendar();
                            this.computeNextActions();
                        }
                    } catch (error) {
                        console.error('Error loading erev jag dates:', error);
                    }
                },

                initErevJagCalendar() {
                    const self = this;
                    this.$nextTick(() => {
                        this.erevJagCalendar = flatpickr(this.$refs.erevJagCalendar, {
                            inline: true,
                            mode: "multiple",
                            dateFormat: "Y-m-d",
                            disable: [],
                            onChange(selectedDates, dateStr, instance) {
                                if (dateStr && !self.erevJagDates.includes(dateStr)) {
                                    self.addErevJagDate(dateStr);
                                }
                                instance.clear();
                            },
                            onDayCreate(dObj, dStr, fp, dayElem) {
                                const dateString = dayElem.dateObj.toISOString().split('T')[0];
                                if (self.erevJagDates.includes(dateString)) {
                                    dayElem.addEventListener('click', () => {
                                        self.deleteErevJagDate(dateString);
                                    });
                                }
                            }
                        });
                        this.updateErevJagCalendar();
                    });
                },

                async addErevJagDate(dateString) {
                    try {
                        const response = await fetch('/add_erev_jag_date', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ date: dateString })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.loadErevJagDates();
                        this.showToast(`Erev Jag added: ${dateString}`, 'success');
                    } catch (error) {
                        this.showToast('Error adding date', 'error');
                    }
                },

                updateErevJagCalendar() {
                    if (this.erevJagCalendar) {
                        if (this.erevJagDates.length > 0) {
                            this.erevJagCalendar.set('disable', this.erevJagDates.map(date => ({
                                from: date, to: date
                            })));
                        } else {
                            this.erevJagCalendar.set('disable', []);
                        }
                        this.erevJagCalendar.redraw();
                    }
                },

                async deleteErevJagDate(dateString) {
                    try {
                        const d = this.erevJagDatesWithIds.find(d => d.date === dateString);
                        if (!d) return;
                        const response = await fetch('/delete_erev_jag_date', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ date_id: d.id })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.loadErevJagDates();
                        this.showToast(`Erev Jag removed: ${dateString}`, 'info');
                    } catch (error) {
                        this.showToast('Error removing date', 'error');
                    }
                }
            };
        }
    </script>
</body>
</html>
