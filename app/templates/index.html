<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tevila Control System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/flatpickr.min.css') }}">

    <script src="{{ url_for('static', filename='js/alpine3.min.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/flatpickr.js') }}" defer></script>
</head>
<body x-data="tevilaApp()">

    <template x-if="!authenticated">
        <div class="login-screen">
            <div class="login-card">
                <h2>Tevila Control System</h2>
                <input type="password" x-model="passwordInput" @keyup.enter="login()" placeholder="Enter password" class="login-input">
                <button @click="login()" class="action-btn btn-on">Login</button>
                <p x-show="loginError" class="error-message">Wrong password</p>
            </div>
        </div>
    </template>

    <template x-if="authenticated">
        <div>
    <header>
        <h1>Tevila Control System</h1>
    </header>

    <main>
        <div class="status-card">
            <h2>System Status</h2>
            <p x-text="currentTime">Loading time...</p>
            <p x-text="statusMessage">Checking status...</p>
            <div class="relay-states">
                <span class="relay-badge" :class="heatingState === 'on' ? 'badge-on' : 'badge-off'" x-text="'Heating: ' + heatingState"></span>
                <span class="relay-badge" :class="filteringState === 'on' ? 'badge-on' : 'badge-off'" x-text="'Filtering: ' + filteringState"></span>
            </div>
        </div>

        <div class="control-panel">
            <h2>Relay Controls</h2>
            <div class="relay-controls">
                <div class="relay-group">
                    <h3>Heating</h3>
                    <div class="button-group">
                        <button @click="relayOn('heating')" class="action-btn btn-on">Turn ON</button>
                        <button @click="relayOff('heating')" class="action-btn btn-off">Turn OFF</button>
                        <button @click="toggleRelay('heating')" class="action-btn btn-toggle" :class="heatingState === 'on' ? 'toggle-on' : 'toggle-off'" x-text="heatingState === 'on' ? 'Toggle OFF' : 'Toggle ON'"></button>
                    </div>
                </div>
                <div class="relay-group">
                    <h3>Filtering</h3>
                    <div class="button-group">
                        <button @click="relayOn('filtering')" class="action-btn btn-on">Turn ON</button>
                        <button @click="relayOff('filtering')" class="action-btn btn-off">Turn OFF</button>
                        <button @click="toggleRelay('filtering')" class="action-btn btn-toggle" :class="filteringState === 'on' ? 'toggle-on' : 'toggle-off'" x-text="filteringState === 'on' ? 'Toggle OFF' : 'Toggle ON'"></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="schedule-panel">
            <h2>Heating Schedule</h2>
            <div class="add-hours-form">
                <select x-ref="heatingDaySelect" class="day-select">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                    <option value="Holiday">Holiday</option>
                </select>
                <input type="time" x-ref="heatingStartTime" class="time-input">
                <input type="time" x-ref="heatingEndTime" class="time-input">
                <button @click="addHours('heating')" class="action-btn">Add</button>
            </div>
            <div>
                <template x-if="heatingHours.length > 0">
                    <ul class="hours-list">
                        <template x-for="hour in heatingHours" :key="hour.id">
                            <li class="hour-item">
                                <span x-text="`${hour.day}: ${hour.start_time} - ${hour.end_time}`"></span>
                                <button @click="deleteHour(hour.id)" class="delete-btn">X</button>
                            </li>
                        </template>
                    </ul>
                </template>
                <template x-if="heatingHours.length === 0">
                    <p>No heating schedule configured</p>
                </template>
            </div>
        </div>

        <div class="schedule-panel">
            <h2>Filtering Schedule</h2>
            <div class="add-hours-form">
                <select x-ref="filteringDaySelect" class="day-select">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                    <option value="Holiday">Holiday</option>
                </select>
                <input type="time" x-ref="filteringStartTime" class="time-input">
                <input type="time" x-ref="filteringEndTime" class="time-input">
                <button @click="addHours('filtering')" class="action-btn">Add</button>
            </div>
            <div>
                <template x-if="filteringHours.length > 0">
                    <ul class="hours-list">
                        <template x-for="hour in filteringHours" :key="hour.id">
                            <li class="hour-item">
                                <span x-text="`${hour.day}: ${hour.start_time} - ${hour.end_time}`"></span>
                                <button @click="deleteHour(hour.id)" class="delete-btn">X</button>
                            </li>
                        </template>
                    </ul>
                </template>
                <template x-if="filteringHours.length === 0">
                    <p>No filtering schedule configured</p>
                </template>
            </div>
        </div>

        <div class="calendar-panel">
            <h2>Special Dates (Holidays)</h2>
            <div id="calendar" x-ref="calendar"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Tevila Control System</p>
    </footer>
        </div>
    </template>

    <script>
        function tevilaApp() {
            return {
                authenticated: false,
                passwordInput: '',
                loginError: false,
                currentTime: 'Loading time...',
                statusMessage: 'Checking status...',
                heatingState: '...',
                filteringState: '...',
                heatingHours: [],
                filteringHours: [],
                specialDates: [],
                specialDatesWithIds: [],
                apiToken: 'FeGHtFHiQmukbZXB4ygUZiJPqeiKD6318Q0xZjzbAKT2L1MC72IB8ed2hIZ9J6jX',
                calendar: null,

                async login() {
                    try {
                        const response = await fetch('/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ password: this.passwordInput })
                        });
                        if (response.ok) {
                            this.authenticated = true;
                            this.loginError = false;
                            this.startApp();
                        } else {
                            this.loginError = true;
                        }
                    } catch (error) {
                        this.loginError = true;
                    }
                },

                startApp() {
                    this.startClock();
                    this.checkStatus();
                    this.loadHours();
                    this.loadSpecialDates();
                    this.initCalendar();
                    setInterval(() => this.checkStatus(), 30000);
                },

                async init() {
                    try {
                        const response = await fetch('/check_session');
                        if (response.ok) {
                            this.authenticated = true;
                            this.startApp();
                            return;
                        }
                    } catch (e) {}
                },

                startClock() {
                    this.updateTime();
                    setInterval(() => this.updateTime(), 1000);
                },

                updateTime() {
                    const now = new Date();
                    this.currentTime = `Current Time: ${now.toLocaleString()}`;
                },

                async checkStatus() {
                    try {
                        const response = await fetch('/api/status', {
                            method: 'GET',
                            headers: { 'Authorization': 'Bearer ' + this.apiToken }
                        });
                        if (!response.ok) throw new Error('Network error');
                        const data = await response.json();
                        this.statusMessage = `Status: ${data.status} (Last updated: ${data.time})`;
                        this.heatingState = data.heating;
                        this.filteringState = data.filtering;
                    } catch (error) {
                        this.statusMessage = 'Error connecting to server';
                        console.error('Error:', error);
                    }
                },

                async relayOn(relayName) {
                    try {
                        const response = await fetch('/relay/on', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ relay: relayName })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.checkStatus();
                    } catch (error) {
                        this.statusMessage = `Error turning on ${relayName}`;
                        console.error('Error:', error);
                    }
                },

                async toggleRelay(relayName) {
                    const currentState = relayName === 'heating' ? this.heatingState : this.filteringState;
                    if (currentState === 'on') {
                        await this.relayOff(relayName);
                    } else {
                        await this.relayOn(relayName);
                    }
                },

                async relayOff(relayName) {
                    try {
                        const response = await fetch('/relay/off', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ relay: relayName })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.checkStatus();
                    } catch (error) {
                        this.statusMessage = `Error turning off ${relayName}`;
                        console.error('Error:', error);
                    }
                },

                async loadHours() {
                    try {
                        const response = await fetch('/hours', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({})
                        });
                        if (!response.ok) throw new Error('Network error');
                        const data = await response.json();
                        if (data.hours && Array.isArray(data.hours)) {
                            this.heatingHours = data.hours.filter(h => h.relay === 'heating');
                            this.filteringHours = data.hours.filter(h => h.relay === 'filtering');
                        }
                    } catch (error) {
                        console.error('Error loading hours:', error);
                    }
                },

                async addHours(relayName) {
                    try {
                        const dayRef = relayName + 'DaySelect';
                        const startRef = relayName + 'StartTime';
                        const endRef = relayName + 'EndTime';

                        const day = this.$refs[dayRef].value;
                        const startTime = this.$refs[startRef].value;
                        const endTime = this.$refs[endRef].value;

                        if (!day || !startTime || !endTime) {
                            alert('Please select day, start time and end time');
                            return;
                        }

                        const response = await fetch('/add_hours', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({
                                relay: relayName,
                                day: day,
                                start_time: startTime,
                                end_time: endTime
                            })
                        });
                        if (!response.ok) throw new Error('Failed to add hours');
                        await this.loadHours();
                        this.$refs[startRef].value = '';
                        this.$refs[endRef].value = '';
                        this.statusMessage = `Schedule added for ${relayName} on ${day}`;
                    } catch (error) {
                        this.statusMessage = 'Error adding hours';
                        console.error('Error:', error);
                    }
                },

                async deleteHour(hourId) {
                    try {
                        if (!confirm("Delete this schedule entry?")) return;
                        const response = await fetch('/delete_hours', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ hour_id: hourId })
                        });
                        if (!response.ok) throw new Error('Failed to delete');
                        await this.loadHours();
                        this.statusMessage = 'Schedule entry deleted';
                    } catch (error) {
                        this.statusMessage = 'Error deleting schedule';
                        console.error('Error:', error);
                    }
                },

                async loadSpecialDates() {
                    try {
                        const response = await fetch('/dates', {
                            method: 'GET',
                            headers: { 'Authorization': 'Bearer ' + this.apiToken }
                        });
                        if (!response.ok) throw new Error('Failed to load dates');
                        const data = await response.json();
                        if (data.dates && Array.isArray(data.dates)) {
                            this.specialDatesWithIds = data.dates;
                            this.specialDates = data.dates.map(d => d.date);
                            this.updateCalendar();
                        }
                    } catch (error) {
                        console.error('Error loading special dates:', error);
                    }
                },

                initCalendar() {
                    const self = this;
                    this.$nextTick(() => {
                        this.calendar = flatpickr(this.$refs.calendar, {
                            inline: true,
                            mode: "multiple",
                            dateFormat: "Y-m-d",
                            disable: [],
                            onChange(selectedDates, dateStr, instance) {
                                if (dateStr && !self.specialDates.includes(dateStr)) {
                                    self.addSpecialDateFromCalendar(dateStr);
                                }
                                instance.clear();
                            },
                            onDayCreate(dObj, dStr, fp, dayElem) {
                                const dateString = dayElem.dateObj.toISOString().split('T')[0];
                                if (self.specialDates.includes(dateString)) {
                                    dayElem.addEventListener('click', () => {
                                        self.deleteSpecialDate(dateString);
                                    });
                                }
                            }
                        });
                        this.updateCalendar();
                    });
                },

                async addSpecialDateFromCalendar(dateString) {
                    try {
                        const response = await fetch('/add_date', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ date: dateString })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.loadSpecialDates();
                        this.statusMessage = `Special date added: ${dateString}`;
                    } catch (error) {
                        this.statusMessage = 'Error adding special date';
                        console.error('Error:', error);
                    }
                },

                updateCalendar() {
                    if (this.calendar) {
                        if (this.specialDates.length > 0) {
                            this.calendar.set('disable', this.specialDates.map(date => ({
                                from: date, to: date
                            })));
                        } else {
                            this.calendar.set('disable', []);
                        }
                        this.calendar.redraw();
                    }
                },

                async deleteSpecialDate(dateString) {
                    try {
                        const specialDate = this.specialDatesWithIds.find(d => d.date === dateString);
                        if (!specialDate) return;
                        const response = await fetch('/delete_date', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + this.apiToken
                            },
                            body: JSON.stringify({ date_id: specialDate.id })
                        });
                        if (!response.ok) throw new Error('Failed');
                        await this.loadSpecialDates();
                        this.statusMessage = `Special date deleted: ${dateString}`;
                    } catch (error) {
                        this.statusMessage = 'Error deleting special date';
                        console.error('Error:', error);
                    }
                }
            };
        }
    </script>
</body>
</html>
